<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- ✅ Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'home' %}">ABC Bank</a>

        <ul class="navbar-nav ms-auto">

            {% if user.is_authenticated %}
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'profile' %}">Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>
            {% endif %}

        </ul>
    </div>
</nav>

<!-- ✅ Messages -->
{% if messages %}
<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    {% for message in messages %}
    <div class="toast show align-items-center text-white 
        {% if message.tags == 'error' %}bg-danger
        {% elif message.tags == 'warning' %}bg-warning
        {% else %}bg-success{% endif %}
        border-0 mb-2 shadow" role="alert">

        <div class="d-flex">
            <div class="toast-body">
                {{ message }}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"></button>
        </div>

    </div>
    {% endfor %}
</div>
{% endif %}

<!-- Auto remove messages -->
<script>
setTimeout(() => {
    let toasts = document.querySelectorAll('.toast');
    toasts.forEach(t => t.remove());
}, 3000);
</script>


{% block content %}

{% endblock %}

<!-- ✅ Balance Toggle Script -->
<script>
function toggleBalance() {
    let balance = document.getElementById("balance");
    let btn = document.getElementById("btn");

    if (balance.classList.contains("d-none")) {
        balance.classList.remove("d-none");
        btn.innerText = "Hide Balance";
    } else {
        balance.classList.add("d-none");
        btn.innerText = "Show Balance";
    }
}
</script>

</body>
</html>
